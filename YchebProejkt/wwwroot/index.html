<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Управление инструкциями</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<h1 class="p-3 bg-primary text-white">Управление инструкциями</h1>

<div class="container-fluid">
    <div class="row vh-100">

        <div class="col-3 bg-darker-dark-my p-3">

            <h4 class="mb-3">Разделы</h4>

            <button class="btn btn-outline-light w-100 mb-2"
                    onclick="setCatalogue('инструкции')">
                Инструкции
            </button>

            <button class="btn btn-outline-light w-100 mb-2"
                    onclick="setCatalogue('регистры')">
                Регистры
            </button>

            <button class="btn btn-outline-light w-100"
                    onclick="setCatalogue('управления')">
                Управления
            </button>

        </div>

        <div class="col-9 p-4">

            <div class="card bg-primary text-white p-3 mb-4">

                <h4>Загрузить в: <span id="activeCatalogue">инструкции</span></h4>

                <input type="text" id="title" class="form-control mb-2" placeholder="Название">

                <div id="instructionFields">
                    <select id="registrySelect" class="form-select mb-2">
                        <option value="">Выберите регистр</option>
                    </select>
                    <input type="file" id="formFile" class="form-control mb-3">
                </div>

                <div id="registryFields" style="display:none;">
                    <select id="managementSelect" class="form-select mb-2">
                        <option value="">Выберите управление</option>
                    </select>
                </div>

                <button onclick="upload()" id="uploadButton" class="btn btn-light w-100">
                    Загрузить
                </button>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h4>В базе</h4>
                <div id="searchForInstructions" class="d-flex gap-2 mb-2">
                    <input id="searchTitle" class="form-control" placeholder="Поиск по названию">

                    <select id="registryFilter" class="form-select">
                        <option value="">Все</option>
                    </select>

                    <button onclick="loadCurrentList()" class="btn btn-outline-light">
                        Найти
                    </button>
                </div>

                <button onclick="refresh()" class="btn btn-outline-light btn-sm">
                    Обновить
                </button>
            </div>

            <div id="instructions" class="row g-3"></div>

        </div>

    </div>
</div>
<script src="script.js"></script>
</body>
</html>
